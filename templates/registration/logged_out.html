{% extends "base.html" %}
{% load static %}

{% block title %}تم تسجيل الخروج - {{ company.name|default:"واصل ووتر" }}{% endblock %}

{% block content %}
    <div class="page-title light-background">
      <div class="container d-lg-flex justify-content-between align-items-center">
        <h1 class="mb-2 mb-lg-0">تم تسجيل الخروج</h1>
      </div>
    </div>

    <section id="logged-out" class="logged-out section text-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="p-5 bg-white shadow-sm rounded-4">
                        <i class="bi bi-person-check-fill text-primary fs-1 mb-3"></i>
                        <h2 class="fw-bold mb-3">شكراً لزيارتك!</h2>
                        <p class="text-muted fs-5">لقد تم تسجيل خروجك بأمان. نأمل أن نراك مرة أخرى قريباً.</p>
                        <a href="{% url 'login' %}" class="btn btn-primary mt-4 px-5 py-2 fw-bold rounded-pill">تسجيل الدخول مرة أخرى</a>
                        <p class="mt-3"><a href="{% url 'home' %}" class="text-decoration-none text-secondary small">العودة للرئيسية</a></p>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
